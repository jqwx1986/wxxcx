name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
    # 检出代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 设置 JDK 11
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    # 授予 gradlew 执行权限
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 构建 Debug APK
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # 构建 Release APK
    - name: Build Release APK
      run: ./gradlew assembleRelease

    # 上传 Debug APK
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: yueshengshi-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

    # 上传 Release APK
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: yueshengshi-release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30

    # 显示构建信息
    - name: Build Summary
      run: |
        echo "## 📱 APK Build Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 构建产物：" >> $GITHUB_STEP_SUMMARY
        echo "- Debug APK: 已上传到 Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- Release APK: 已上传到 Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 下载方式：" >> $GITHUB_STEP_SUMMARY
        echo "1. 进入 Actions 页面" >> $GITHUB_STEP_SUMMARY
        echo "2. 选择这次构建" >> $GITHUB_STEP_SUMMARY
        echo "3. 滚动到底部 Artifacts 区域" >> $GITHUB_STEP_SUMMARY
        echo "4. 点击下载 APK 文件" >> $GITHUB_STEP_SUMMARY
